name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set build metadata (UTC)
        run: |
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "APP_VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          # URL sintética para o Prisma durante `next build` (sem serviço Postgres no CI).
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/viandas?schema=public
        run: npm run build
